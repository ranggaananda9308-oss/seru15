<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPACEMAN VIP GACOR</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: auto; border: 2px solid #333; padding: 20px; border-radius: 15px; background: #0a0a0a; }
        canvas { background: #050505; border-radius: 10px; width: 100%; height: auto; }
        #multiplier { font-size: 50px; color: #0f0; font-weight: bold; margin: 15px 0; }
        input { width: 80%; padding: 12px; margin-bottom: 15px; border-radius: 5px; border: none; text-align: center; }
        .btn { width: 100%; padding: 15px; font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 5px; border: none; text-transform: uppercase; }
        #btn-bet { background: #007bff; color: white; }
        #btn-cashout { background: #ff9800; color: white; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>👨‍🚀 SPACEMAN VIP</h2>
        <p>Saldo: <b id="balance">1000</b></p>
        <div id="multiplier">1.00x</div>
        <canvas id="gameCanvas" width="400" height="250"></canvas>
        <br><br>
        <input type="number" id="bet-amount" value="10">
        <button id="btn-bet" class="btn" onclick="startRun()">PASANG TARUHAN</button>
        <button id="btn-cashout" class="btn" onclick="cashOut()">AMBIL UNTUNG</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const multiplierEl = document.getElementById('multiplier');
        const balanceEl = document.getElementById('balance');
        
        const GITHUB_RAW = "https://raw.githubusercontent.com/ranggaananda9308-oss/spaceman-gacor777/main/remote2.json";

        let balance = 1000, isRunning = false, currentMultiplier = 1.00;
        let crashMultiplier = 2.00, spacemanX = 50, spacemanY = 150, angle = 0;

        // SISTEM ANTI-CACHE (Bisa ganti angka berkali-kali)
setInterval(() => {
    fetch(GITHUB_RAW, { cache: 'no-store' })
        .then(res => res.json())
        .then(data => { 
            crashMultiplier = parseFloat(data.angka);
            console.log("Remote Terupdate: " + crashMultiplier);
        })
        .catch(() => console.log("Cek sinyal remote..."));
}, 1000);
        

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            for(let i=0; i<30; i++) ctx.fillRect(Math.random()*400, Math.random()*250, 2, 2);
            ctx.font = '50px Arial';
            ctx.fillText('👨‍🚀', spacemanX, spacemanY);
        }

        function update() {
            if (!isRunning) return;
            draw();
            angle += 0.05;
            spacemanY = 150 + Math.sin(angle) * 25;
            spacemanX += 0.6;
            currentMultiplier += 0.05 * (1 + currentMultiplier * 0.06);
            multiplierEl.innerText = currentMultiplier.toFixed(2) + 'x';

            if (currentMultiplier >= crashMultiplier) {
                isRunning = false;
                multiplierEl.style.color = 'red';
                multiplierEl.innerText = "BOOM! @ " + currentMultiplier.toFixed(2) + "x";
                document.getElementById('btn-bet').style.display = 'block';
                document.getElementById('btn-cashout').style.display = 'none';
            } else {
                requestAnimationFrame(update);
            }
        }

        function startRun() {
            let bet = parseInt(document.getElementById('bet-amount').value);
            if (bet > balance || isNaN(bet)) return alert("Cek Saldo!");
            balance -= bet; balanceEl.innerText = balance;
            isRunning = true; currentMultiplier = 1.00; spacemanX = 50;
            multiplierEl.style.color = '#0f0';
            document.getElementById('btn-bet').style.display = 'none';
            document.getElementById('btn-cashout').style.display = 'block';
            update();
        }

        function cashOut() {
            if (!isRunning) return;
            let win = parseInt(document.getElementById('bet-amount').value) * currentMultiplier;
            balance += Math.floor(win); balanceEl.innerText = balance;
            isRunning = false;
            alert("🤑 PROFIT: " + win.toFixed(2));
            document.getElementById('btn-bet').style.display = 'block';
            document.getElementById('btn-cashout').style.display = 'none';
        }
        draw();
    </script>
</body>
</html>
